<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Endfield Industrial Simulator</title>
    <script src="https://unpkg.com/konva@9/konva.min.js"></script>
    <style>
        :root {
            --sidebar-width: 280px;
            --bg-color: #1a1c1e;
            --sidebar-bg: #25282c;
            --accent-color: #ff9d00;
            --text-color: #e0e0e0;
            --border-color: #3f444a;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        /* サイドバー */
        #sidebar {
            width: var(--sidebar-width);
            height: 100%;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            z-index: 100;
            flex-shrink: 0;
        }

        #sidebar.closed {
            transform: translateX(calc(var(--sidebar-width) * -1));
            position: absolute;
        }

        .sidebar-header {
            padding: 20px;
            font-weight: bold;
            font-size: 1.1em;
            border-bottom: 1px solid var(--border-color);
            background: rgba(0,0,0,0.2);
        }

        #item-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .sidebar-item {
            background: #3f444a;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            user-select: none;
        }

        .sidebar-item:hover {
            background: #4f555c;
            border-color: var(--accent-color);
        }

        .sidebar-item strong {
            display: block;
            color: var(--accent-color);
            margin-bottom: 4px;
        }

        /* マップ表示エリア */
        #stage-parent {
            flex-grow: 1;
            position: relative;
            overflow: hidden;
            background-color: #111;
        }

        /* UIボタン */
        .ui-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 110;
            background: var(--accent-color);
            border: none;
            color: black;
            padding: 10px 18px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* ステータスバー */
        #status-bar {
            position: absolute;
            bottom: 15px;
            left: 15px;
            z-index: 110;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 8px 12px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            pointer-events: none;
            border-left: 3px solid var(--accent-color);
            display: flex;
            gap: 15px;
        }

        #loading {
            padding: 10px;
            color: var(--accent-color);
            text-align: center;
        }

        @media (max-width: 768px) {
            :root { --sidebar-width: 220px; }
        }
    </style>
</head>
<body>

<nav id="sidebar">
    <div class="sidebar-header">工業設備リスト</div>
    <div id="item-list">
        <div id="loading">GitHubからデータ取得中...</div>
    </div>
</nav>

<main id="stage-parent">
    <button class="ui-btn" onclick="toggleSidebar()">メニュー</button>
    
    <div id="status-bar">
        <div>座標: <span id="val-pos">0, 0</span></div>
        <div>ズーム: <span id="val-zoom">30%</span></div>
    </div>

    <div id="container"></div>
</main>

<script>
    // --- 1. 定数・設定 ---
    const DATA_URL = 'https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/main/elements.json';
    const GRID_SIZE = 40; 
    const MAP_BLOCKS = 100;
    const MAP_WIDTH = GRID_SIZE * MAP_BLOCKS;
    const MAP_HEIGHT = GRID_SIZE * MAP_BLOCKS;
    
    const MIN_SCALE = 0.3; 
    const MAX_SCALE = 1.5; 
    const ZOOM_STEP = 0.05; 

    let buildingMaster = [];

    // --- 2. データ読み込み ---
    async function loadExternalData() {
        try {
            const response = await fetch(DATA_URL);
            if (!response.ok) throw new Error('Network error');
            const data = await response.json();
            buildingMaster = data.buildings;
            renderSidebar();
        } catch (error) {
            console.error('Data load failed:', error);
            buildingMaster = [
                { id: 'asmb_1', name: '加工機 T1', size: [3, 3], power: -50, color: '#4a9eff' },
                { id: 'pole_1', name: '送電パイル', size: [1, 1], power: 0, color: '#ffeb3b' }
            ];
            renderSidebar();
            const ld = document.getElementById('loading');
            if(ld) ld.innerHTML = '<small style="color:#888">GitHubデータ未設定: プレビューモード</small>';
        }
    }

    function renderSidebar() {
        const itemList = document.getElementById('item-list');
        const loading = document.getElementById('loading');
        if(loading) loading.remove();

        buildingMaster.forEach(item => {
            const div = document.createElement('div');
            div.className = 'sidebar-item';
            div.style.borderLeft = `4px solid ${item.color || '#ccc'}`;
            div.innerHTML = `
                <strong>${item.name}</strong>
                <small>サイズ: ${item.size[0]}x${item.size[1]} | 電力: ${item.power}</small>
            `;
            div.onclick = () => console.log('Selected:', item.id);
            itemList.appendChild(div);
        });
    }

    // --- 3. Konva 初期化 ---
    const stage = new Konva.Stage({
        container: 'container',
        width: window.innerWidth,
        height: window.innerHeight,
        draggable: true,
        scaleX: MIN_SCALE,
        scaleY: MIN_SCALE
    });

    const layer = new Konva.Layer();
    stage.add(layer);

    function drawGrid() {
        const bg = new Konva.Rect({
            x: 0, y: 0,
            width: MAP_WIDTH, height: MAP_HEIGHT,
            fill: '#1a1c1e',
        });
        layer.add(bg);

        const lineColor = '#2a2a2a';
        for (let i = 0; i <= MAP_BLOCKS; i++) {
            layer.add(new Konva.Line({
                points: [i * GRID_SIZE, 0, i * GRID_SIZE, MAP_HEIGHT],
                stroke: lineColor, strokeWidth: 1, listening: false
            }));
            layer.add(new Konva.Line({
                points: [0, i * GRID_SIZE, MAP_WIDTH, i * GRID_SIZE],
                stroke: lineColor, strokeWidth: 1, listening: false
            }));
        }
    }

    // --- 4. 情報更新関数 (クランプ処理追加) ---
    function updateStatus() {
        const scale = Math.round(stage.scaleX() * 100);
        document.getElementById('val-zoom').innerText = scale + '%';

        const pointer = stage.getPointerPosition();
        if (pointer) {
            const mousePointTo = {
                x: (pointer.x - stage.x()) / stage.scaleX(),
                y: (pointer.y - stage.y()) / stage.scaleX(),
            };

            // 座標計算
            let gridX = Math.floor(mousePointTo.x / GRID_SIZE);
            let gridY = Math.floor(mousePointTo.y / GRID_SIZE);

            // 【追加】クランプ処理：マイナスを0に、100超えを100に制限
            gridX = Math.max(0, Math.min(MAP_BLOCKS, gridX));
            gridY = Math.max(0, Math.min(MAP_BLOCKS, gridY));

            document.getElementById('val-pos').innerText = `${gridX}, ${gridY}`;
        }
    }

    // --- 5. 操作ロジック ---
    stage.on('wheel', (e) => {
        e.evt.preventDefault();
        const oldScale = stage.scaleX();
        const pointer = stage.getPointerPosition();
        if (!pointer) return;
        
        const mousePointTo = { x: (pointer.x - stage.x()) / oldScale, y: (pointer.y - stage.y()) / oldScale };
        
        let newScale = e.evt.deltaY > 0 ? oldScale - ZOOM_STEP : oldScale + ZOOM_STEP;
        newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, newScale));

        stage.scale({ x: newScale, y: newScale });
        stage.position({ x: pointer.x - mousePointTo.x * newScale, y: pointer.y - mousePointTo.y * newScale });
        
        updateStatus();
    });

    stage.on('mousemove touchmove', updateStatus);

    let lastDist = 0;
    stage.on('touchmove', function (e) {
        if (e.evt.touches.length === 2) {
            const touch1 = e.evt.touches[0];
            const touch2 = e.evt.touches[1];
            const dist = Math.sqrt(Math.pow(touch2.clientX - touch1.clientX, 2) + Math.pow(touch2.clientY - touch1.clientY, 2));
            if (!lastDist) { lastDist = dist; return; }
            let newScale = stage.scaleX() * (dist / lastDist);
            newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, newScale));
            stage.scale({ x: newScale, y: newScale });
            lastDist = dist;
            updateStatus();
        }
    });
    stage.on('touchend', () => { lastDist = 0; });

    // --- 6. UI制御 ---
    function toggleSidebar() {
        const sb = document.getElementById('sidebar');
        sb.classList.toggle('closed');
        setTimeout(handleResize, 350);
    }

    function handleResize() {
        const container = document.getElementById('stage-parent');
        if (!container) return;
        stage.width(container.offsetWidth);
        stage.height(container.offsetHeight);
        updateStatus();
    }

    window.addEventListener('resize', handleResize);

    drawGrid();
    layer.draw();
    loadExternalData();
    handleResize();
    
    stage.position({ x: 20, y: 20 });
    updateStatus();
</script>
</body>
</html>
