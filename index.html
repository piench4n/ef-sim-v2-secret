<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Endfield Industrial Simulator</title>
    <script src="https://unpkg.com/konva@9/konva.min.js"></script>
    <style>
        :root {
            --sidebar-width: 280px;
            --bg-color: #1a1c1e;
            --sidebar-bg: #25282c;
            --accent-color: #ff9d00;
            --text-color: #e0e0e0;
            --border-color: #3f444a;
            --transition-speed: 0.3s;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        /* サイドバー */
        #sidebar {
            width: var(--sidebar-width);
            height: 100%;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            transition: transform var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            z-index: 100;
            flex-shrink: 0;
            overflow-y: auto;
        }

        #sidebar.closed {
            transform: translateX(calc(var(--sidebar-width) * -1));
            position: absolute;
        }

        .sidebar-section {
            padding: 20px 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-section h3 {
            margin: 0 0 15px 0;
            font-size: 0.9em;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* マップサイズ選択ボタン */
        .size-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .size-btn {
            background: #3f444a;
            border: 1px solid transparent;
            color: white;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85em;
            transition: 0.2s;
        }

        .size-btn:hover { background: #4f555c; }
        .size-btn.active {
            border-color: var(--accent-color);
            background: rgba(255, 157, 0, 0.1);
            color: var(--accent-color);
        }

        /* 設備アイテム */
        .sidebar-item {
            background: #3f444a;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            user-select: none;
        }

        .sidebar-item:hover {
            background: #4f555c;
            border-color: var(--accent-color);
        }

        .sidebar-item strong {
            display: block;
            color: var(--accent-color);
            margin-bottom: 4px;
        }

        /* マップ表示エリア */
        #stage-parent {
            flex-grow: 1;
            position: relative;
            overflow: hidden;
            background-color: #111;
        }

        .ui-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 110;
            background: var(--accent-color);
            border: none;
            color: black;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: left var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
        }

        #status-bar {
            position: absolute;
            bottom: 15px;
            left: 15px;
            z-index: 110;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 8px 12px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            pointer-events: none;
            border-left: 3px solid var(--accent-color);
            display: flex;
            gap: 15px;
            transition: left var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
        }

        #loading { color: var(--accent-color); text-align: center; font-size: 0.8em; }

        @media (max-width: 768px) { :root { --sidebar-width: 220px; } }
    </style>
</head>
<body>

<nav id="sidebar">
    <div class="sidebar-section">
        <h3>マップサイズ</h3>
        <div class="size-selector">
            <button class="size-btn" onclick="changeMapSize(40)">40x40</button>
            <button class="size-btn" onclick="changeMapSize(50)">50x50</button>
            <button class="size-btn" onclick="changeMapSize(70)">70x70</button>
            <button class="size-btn active" onclick="changeMapSize(80)">80x80</button>
        </div>
    </div>

    <div class="sidebar-section">
        <h3>設備一覧</h3>
        <div id="item-list">
            <div id="loading">データ取得中...</div>
        </div>
    </div>
</nav>

<main id="stage-parent">
    <button id="toggle-icon" class="ui-btn" onclick="toggleSidebar()">◀</button>
    
    <div id="status-bar">
        <div>座標: <span id="val-pos">0, 0</span></div>
        <div>ズーム: <span id="val-zoom">30%</span></div>
    </div>

    <div id="container"></div>
</main>

<script>
    // --- 1. 定数・グローバル変数 ---
    const DATA_URL = 'https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/main/elements.json';
    const GRID_SIZE = 40; 
    let currentMapBlocks = 80; // デフォルトは80x80
    
    const MIN_SCALE = 0.3; 
    const MAX_SCALE = 1.5; 
    const ZOOM_STEP = 0.05; 

    let buildingMaster = [];

    // --- 2. データ読み込み ---
    async function loadExternalData() {
        try {
            const response = await fetch(DATA_URL);
            if (!response.ok) throw new Error('Data Load Error');
            const data = await response.json();
            buildingMaster = data.buildings;
            renderSidebar();
        } catch (error) {
            console.error(error);
            buildingMaster = [
                { id: 'asmb_1', name: '加工機 T1', size: [3, 3], power: -50, color: '#4a9eff' },
                { id: 'pole_1', name: '送電パイル', size: [1, 1], power: 0, color: '#ffeb3b' }
            ];
            renderSidebar();
            const ld = document.getElementById('loading');
            if(ld) ld.innerHTML = '<small style="color:#888">デモデータ読込済</small>';
        }
    }

    function renderSidebar() {
        const itemList = document.getElementById('item-list');
        const loading = document.getElementById('loading');
        if(loading) loading.remove();
        itemList.innerHTML = ''; // クリア

        buildingMaster.forEach(item => {
            const div = document.createElement('div');
            div.className = 'sidebar-item';
            div.style.borderLeft = `4px solid ${item.color || '#ccc'}`;
            div.innerHTML = `
                <strong>${item.name}</strong>
                <small>サイズ: ${item.size[0]}x${item.size[1]} | 電力: ${item.power}</small>
            `;
            div.onclick = () => console.log('Selected:', item.id);
            itemList.appendChild(div);
        });
    }

    // --- 3. マップサイズ変更ロジック ---
    function changeMapSize(size) {
        currentMapBlocks = size;
        
        // ボタンの見た目を更新
        document.querySelectorAll('.size-btn').forEach(btn => {
            btn.classList.toggle('active', btn.innerText === `${size}x${size}`);
        });

        // グリッドを再描画
        drawGrid();
        updateStatus();
    }

    // --- 4. Konva 初期化 ---
    const stage = new Konva.Stage({
        container: 'container',
        width: window.innerWidth,
        height: window.innerHeight,
        draggable: true,
        scaleX: MIN_SCALE,
        scaleY: MIN_SCALE
    });

    const layer = new Konva.Layer();
    const gridLayer = new Konva.Layer(); // グリッド専用レイヤー
    stage.add(gridLayer);
    stage.add(layer);

    function drawGrid() {
        gridLayer.destroyChildren(); // 古いグリッドを削除

        const mapWidth = GRID_SIZE * currentMapBlocks;
        const mapHeight = GRID_SIZE * currentMapBlocks;

        const bg = new Konva.Rect({
            x: 0, y: 0, width: mapWidth, height: mapHeight, fill: '#1a1c1e',
        });
        gridLayer.add(bg);

        const lineColor = '#2a2a2a';
        for (let i = 0; i <= currentMapBlocks; i++) {
            gridLayer.add(new Konva.Line({
                points: [i * GRID_SIZE, 0, i * GRID_SIZE, mapHeight],
                stroke: lineColor, strokeWidth: 1, listening: false
            }));
            gridLayer.add(new Konva.Line({
                points: [0, i * GRID_SIZE, mapWidth, i * GRID_SIZE],
                stroke: lineColor, strokeWidth: 1, listening: false
            }));
        }
        gridLayer.draw();
    }

    // --- 5. ステータス・操作 ---
    function updateStatus() {
        const scale = Math.round(stage.scaleX() * 100);
        const zoomEl = document.getElementById('val-zoom');
        if(zoomEl) zoomEl.innerText = scale + '%';

        const pointer = stage.getPointerPosition();
        if (pointer) {
            const mousePointTo = {
                x: (pointer.x - stage.x()) / stage.scaleX(),
                y: (pointer.y - stage.y()) / stage.scaleX(),
            };
            let gridX = Math.floor(mousePointTo.x / GRID_SIZE);
            let gridY = Math.floor(mousePointTo.y / GRID_SIZE);
            
            // 現在のマップサイズでクランプ
            gridX = Math.max(0, Math.min(currentMapBlocks, gridX));
            gridY = Math.max(0, Math.min(currentMapBlocks, gridY));
            
            const posEl = document.getElementById('val-pos');
            if(posEl) posEl.innerText = `${gridX}, ${gridY}`;
        }
    }

    stage.on('wheel', (e) => {
        e.evt.preventDefault();
        const oldScale = stage.scaleX();
        const pointer = stage.getPointerPosition();
        if (!pointer) return;
        const mousePointTo = { x: (pointer.x - stage.x()) / oldScale, y: (pointer.y - stage.y()) / oldScale };
        let newScale = e.evt.deltaY > 0 ? oldScale - ZOOM_STEP : oldScale + ZOOM_STEP;
        newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, newScale));
        stage.scale({ x: newScale, y: newScale });
        stage.position({ x: pointer.x - mousePointTo.x * newScale, y: pointer.y - mousePointTo.y * newScale });
        updateStatus();
    });

    stage.on('mousemove touchmove', updateStatus);

    // --- 6. UI制御 ---
    function toggleSidebar() {
        const sb = document.getElementById('sidebar');
        const btn = document.getElementById('toggle-icon');
        const statusBar = document.getElementById('status-bar');
        const isClosed = sb.classList.toggle('closed');

        if (isClosed) {
            btn.innerText = "▶";
            statusBar.style.left = "15px";
        } else {
            btn.innerText = "◀";
            const sidebarWidth = document.getElementById('sidebar').offsetWidth;
            statusBar.style.left = (sidebarWidth + 15) + "px";
        }

        let start = null;
        function animateStep(timestamp) {
            if (!start) start = timestamp;
            handleResize();
            if (timestamp - start < 350) requestAnimationFrame(animateStep);
        }
        requestAnimationFrame(animateStep);
    }

    function handleResize() {
        const container = document.getElementById('stage-parent');
        if (!container) return;
        stage.width(container.offsetWidth);
        stage.height(container.offsetHeight);
        updateStatus();
    }

    window.addEventListener('resize', handleResize);

    // 起動
    drawGrid();
    loadExternalData();
    setTimeout(() => {
        const sidebarWidth = document.getElementById('sidebar').offsetWidth;
        document.getElementById('status-bar').style.left = (sidebarWidth + 15) + "px";
        handleResize();
    }, 100);
    stage.position({ x: 20, y: 20 });
    updateStatus();
</script>
</body>
</html>
