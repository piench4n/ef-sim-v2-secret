<!DOCTYPE html>
<html lang="ja">
<head>
    <meta name="robots" content="noindex">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        :root { --sidebar-width: 250px; }
        body { margin: 0; display: flex; height: 100vh; overflow: hidden; font-family: sans-serif; }
        
        /* サイドバー */
        #sidebar { 
            width: var(--sidebar-width); 
            background: #222; color: white; 
            transition: transform 0.3s; z-index: 10;
        }
        #sidebar.closed { transform: translateX(-100%); position: absolute; }
        
        /* メイングリッド */
        #canvas-container { flex-grow: 1; background: #333; position: relative; }
        canvas { border: 1px solid #444; }

        /* 操作UI */
        .toggle-btn { position: absolute; left: 10px; top: 10px; z-index: 20; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3>設備リスト</h3>
    <div id="item-list">
        <div class="item" data-size="3x3">加工機A</div>
    </div>
</div>

<div id="canvas-container">
    <button class="toggle-btn" onclick="toggleSidebar()">☰</button>
    <canvas id="gridCanvas"></canvas>
</div>

<script src="https://unpkg.com/konva@9/konva.min.js"></script>
<script>
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('closed');
    }

    // Konva.js 等を使用して、スマホのタップ操作や
    // グリッドスナップ（マス目への吸着）ロジックをここに記述します
    // GitHub上の JSON を fetch() して動的に設備を増やす処理も可能です
</script>
</body>
</html>
