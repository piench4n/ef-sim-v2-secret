<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Endfield Industrial Simulator</title>
    <script src="https://unpkg.com/konva@9/konva.min.js"></script>
    <style>
        :root {
            --sidebar-width: 280px;
            --bg-color: #1a1c1e;
            --sidebar-bg: #25282c;
            --accent-color: #ff9d00;
            --text-color: #e0e0e0;
            --border-color: #3f444a;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        /* サイドバー */
        #sidebar {
            width: var(--sidebar-width);
            height: 100%;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            z-index: 100;
            flex-shrink: 0;
        }

        #sidebar.closed {
            transform: translateX(calc(var(--sidebar-width) * -1));
            position: absolute;
        }

        .sidebar-header {
            padding: 20px;
            font-weight: bold;
            font-size: 1.1em;
            border-bottom: 1px solid var(--border-color);
            background: rgba(0,0,0,0.2);
        }

        #item-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .sidebar-item {
            background: #3f444a;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            user-select: none;
        }

        .sidebar-item:hover {
            background: #4f555c;
            border-color: var(--accent-color);
        }

        .sidebar-item strong {
            display: block;
            color: var(--accent-color);
            margin-bottom: 4px;
        }

        .sidebar-item small {
            color: #bbb;
            font-size: 0.8em;
        }

        /* マップ表示エリア */
        #stage-parent {
            flex-grow: 1;
            position: relative;
            overflow: hidden;
            background-color: #111;
        }

        /* UIボタン */
        .ui-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 110;
            background: var(--accent-color);
            border: none;
            color: black;
            padding: 10px 18px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* ステータスバー（追加） */
        #status-bar {
            position: absolute;
            bottom: 15px;
            left: 15px;
            z-index: 110;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 8px 12px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            pointer-events: none; /* クリックを透過させてマップ操作を邪魔しない */
            border-left: 3px solid var(--accent-color);
            display: flex;
            gap: 15px;
        }

        #loading {
            padding: 10px;
            color: var(--accent-color);
            text-align: center;
        }

        @media (max-width: 768px) {
            :root { --sidebar-width: 220px; }
        }
    </style>
</head>
<body>

<nav id="sidebar">
    <div class="sidebar-header">工業設備リスト</div>
    <div id="item-list">
        <div id="loading">GitHubからデータ取得中...</div>
    </div>
</nav>

<main id="stage-parent">
    <button class="ui-btn" onclick="toggleSidebar()">MENU</button>
    
    <div id="status-bar">
        <div>ZOOM: <span id="val-zoom">100%</span></div>
        <div>POS: <span id="val-pos">0, 0</span></div>
    </div>

    <div id="container"></div>
</main>

<script>
    // --- 1. 定数・設定 ---
    const DATA_URL = 'https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/main/elements.json';
    const GRID_SIZE = 40; 
    const MAP_BLOCKS = 100;
    const MAP_WIDTH = GRID_SIZE * MAP_BLOCKS;
    const MAP_HEIGHT = GRID_SIZE * MAP_BLOCKS;
    
    const MIN_SCALE = 0.3; 
    const MAX_SCALE = 1.5; 

    let buildingMaster = [];

    // --- 2. データ読み込み ---
    async function loadExternalData() {
        try {
            const response = await fetch(DATA_URL);
            if (!response.ok) throw new Error('Network error');
            const data = await response.json();
            buildingMaster = data.buildings;
            renderSidebar();
        } catch (error) {
            console.error('Data load failed:', error);
            buildingMaster = [
                { id: 'asmb_1', name: '加工機 T1', size: [3, 3], power: -50, color: '#4a9eff' },
                { id: 'pole_1', name: '送電パイル', size: [1, 1], power: 0, color: '#ffeb3b' }
            ];
            renderSidebar();
            const ld = document.getElementById('loading');
            if(ld) ld.innerHTML = '<small style="color:#888">GitHubデータ未設定: プレビューモード</small>';
        }
    }

    function renderSidebar() {
        const itemList = document.getElementById('item-list');
        const loading = document.getElementById('loading');
        if(loading) loading.remove();

        buildingMaster.forEach(item => {
            const div = document.createElement('div');
            div.className = 'sidebar-item';
            div.style.borderLeft = `4px solid ${item.color || '#ccc'}`;
            div.innerHTML = `
                <strong>${item.name}</strong>
                <small>サイズ: ${item.size[0]}x${item.size[1]} | 電力: ${item.power}</small>
            `;
            div.onclick = () => console.log('Selected:', item.id);
            itemList.appendChild(div);
        });
    }

    // --- 3. Konva 初期化 ---
    const stage = new Konva.Stage({
        container: 'container',
        width: window.innerWidth,
        height: window.innerHeight,
        draggable: true,
    });

    const layer = new Konva.Layer();
    stage.add(layer);

    function drawGrid() {
        const bg = new Konva.Rect({
            x: 0, y: 0,
            width: MAP_WIDTH, height: MAP_HEIGHT,
            fill: '#1a1c1e',
        });
        layer.add(bg);

        const lineColor = '#2a2a2a';
        for (let i = 0; i <= MAP_BLOCKS; i++) {
            layer.add(new Konva.Line({
                points: [i * GRID_SIZE, 0, i * GRID_SIZE, MAP_HEIGHT],
                stroke: lineColor, strokeWidth: 1, listening: false
            }));
            layer.add(new Konva.Line({
                points: [0, i * GRID_SIZE, MAP_WIDTH, i * GRID_SIZE],
                stroke: lineColor, strokeWidth: 1, listening: false
            }));
        }
    }

    // --- 4. 座標・ズーム情報の更新関数 ---
    function updateStatus() {
        // ズーム倍率の更新
        const scale = Math.round(stage.scaleX() * 100);
        document.getElementById('val-zoom').innerText = scale + '%';

        // マウス/タッチ座標からマス目(0-99)を計算
        const pointer = stage.getPointerPosition();
        if (pointer) {
            const mousePointTo = {
                x: (pointer.x - stage.x()) / stage.scaleX(),
                y: (pointer.y - stage.y()) / stage.scaleX(),
            };
            const gridX = Math.floor(mousePointTo.x / GRID_SIZE);
            const gridY = Math.floor(mousePointTo.y / GRID_SIZE);

            // マップの範囲内のみ表示
            if (gridX >= 0 && gridX < MAP_BLOCKS && gridY >= 0 && gridY < MAP_BLOCKS) {
                document.getElementById('val-pos').innerText = `${gridX}, ${gridY}`;
            } else {
                document.getElementById('val-pos').innerText = `OUT`;
            }
        }
    }

    // --- 5. 操作ロジック ---
    stage.on('wheel', (e) => {
        e.evt.preventDefault();
        const oldScale = stage.scaleX();
        const pointer = stage.getPointerPosition();
        const mousePointTo = { x: (pointer.x - stage.x()) / oldScale, y: (pointer.y - stage.y()) / oldScale };
        
        let newScale = e.evt.deltaY > 0 ? oldScale / 1.1 : oldScale * 1.1;
        if (newScale < MIN_SCALE) newScale = MIN_SCALE;
        if (newScale > MAX_SCALE) newScale = MAX_SCALE;

        stage.scale({ x: newScale, y: newScale });
        stage.position({ x: pointer.x - mousePointTo.x * newScale, y: pointer.y - mousePointTo.y * newScale });
        
        updateStatus();
    });

    // マウスが動くたびに座標を更新
    stage.on('mousemove touchmove', updateStatus);

    // スマホ用ピンチ
    let lastDist = 0;
    stage.on('touchmove', function (e) {
        if (e.evt.touches.length === 2) {
            const touch1 = e.evt.touches[0];
            const touch2 = e.evt.touches[1];
            const dist = Math.sqrt(Math.pow(touch2.clientX - touch1.clientX, 2) + Math.pow(touch2.clientY - touch1.clientY, 2));
            if (!lastDist) { lastDist = dist; return; }
            let newScale = stage.scaleX() * (dist / lastDist);
            if (newScale < MIN_SCALE) newScale = MIN_SCALE;
            if (newScale > MAX_SCALE) newScale = MAX_SCALE;
            stage.scale({ x: newScale, y: newScale });
            lastDist = dist;
            updateStatus();
        }
    });
    stage.on('touchend', () => { lastDist = 0; });

    // --- 6. UI制御 ---
    function toggleSidebar() {
        const sb = document.getElementById('sidebar');
        sb.classList.toggle('closed');
        setTimeout(handleResize, 350);
    }

    function handleResize() {
        const container = document.getElementById('stage-parent');
        stage.width(container.offsetWidth);
        stage.height(container.offsetHeight);
        updateStatus();
    }

    window.addEventListener('resize', handleResize);

    drawGrid();
    layer.draw();
    loadExternalData();
    handleResize();
</script>
</body>
</html>
