<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Endfield Industrial Simulator</title>
    <script src="https://unpkg.com/konva@9/konva.min.js"></script>
    <style>
        :root {
            --sidebar-width: 280px;
            --bg-color: #1a1c1e;
            --sidebar-bg: #25282c;
            --accent-color: #ff9d00;
            --text-color: #e0e0e0;
            --border-color: #3f444a;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            overflow: hidden;
        }

        /* サイドバー */
        #sidebar {
            width: var(--sidebar-width);
            height: 100%;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            z-index: 100;
            flex-shrink: 0;
        }

        #sidebar.closed {
            transform: translateX(calc(var(--sidebar-width) * -1));
            position: absolute;
        }

        .sidebar-header {
            padding: 20px;
            font-weight: bold;
            font-size: 1.1em;
            border-bottom: 1px solid var(--border-color);
            background: rgba(0,0,0,0.2);
        }

        #item-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
        }

        /* 設備アイテムカード */
        .sidebar-item {
            background: #3f444a;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .sidebar-item:hover {
            background: #4f555c;
            border-color: var(--accent-color);
        }

        .sidebar-item strong {
            display: block;
            color: var(--accent-color);
            margin-bottom: 4px;
        }

        .sidebar-item small {
            color: #bbb;
            font-size: 0.8em;
        }

        /* マップ表示エリア */
        #stage-parent {
            flex-grow: 1;
            position: relative;
            overflow: hidden;
            background-image: radial-gradient(#2a2d31 1px, transparent 1px);
            background-size: 40px 40px; /* 目安のドット背景 */
        }

        /* UIボタン */
        .ui-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 110;
            background: var(--accent-color);
            border: none;
            color: black;
            padding: 10px 18px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* ローディング表示 */
        #loading {
            padding: 10px;
            color: var(--accent-color);
            text-align: center;
        }

        @media (max-width: 768px) {
            :root { --sidebar-width: 220px; }
        }
    </style>
</head>
<body>

<nav id="sidebar">
    <div class="sidebar-header">工業設備リスト</div>
    <div id="item-list">
        <div id="loading">GitHubからデータ取得中...</div>
    </div>
</nav>

<main id="stage-parent">
    <button class="ui-btn" onclick="toggleSidebar()">MENU</button>
    <div id="container"></div>
</main>

<script>
    // --- 1. 設定・データ管理 ---
    // ※管理者：ここにあなたのGitHub Raw URLを貼り付けてください
    const DATA_URL = 'https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/main/elements.json';
    
    const GRID_SIZE = 40; 
    const MAP_BLOCKS = 100;
    const MAP_WIDTH = GRID_SIZE * MAP_BLOCKS;
    const MAP_HEIGHT = GRID_SIZE * MAP_BLOCKS;

    let buildingMaster = [];

    // --- 2. GitHubからのデータ取得 ---
    async function loadExternalData() {
        try {
            const response = await fetch(DATA_URL);
            if (!response.ok) throw new Error('取得失敗');
            const data = await response.json();
            buildingMaster = data.buildings;
            renderSidebar();
        } catch (error) {
            console.error('Error:', error);
            // テスト用のダミーデータ（GitHubが設定されるまで表示）
            buildingMaster = [
                { id: 'asmb_1', name: '加工機 T1', size: [3, 3], power: -50, color: '#4a9eff' },
                { id: 'pole_1', name: '送電パイル', size: [1, 1], power: 0, color: '#ffeb3b' }
            ];
            renderSidebar();
            document.getElementById('loading').innerHTML = '<small style="color:red">GitHubデータ未設定: デモモード</small>';
        }
    }

    function renderSidebar() {
        const itemList = document.getElementById('item-list');
        const loading = document.getElementById('loading');
        if(loading) loading.remove();

        buildingMaster.forEach(item => {
            const div = document.createElement('div');
            div.className = 'sidebar-item';
            div.style.borderLeft = `4px solid ${item.color || '#ccc'}`;
            div.innerHTML = `
                <strong>${item.name}</strong>
                <small>サイズ: ${item.size[0]}x${item.size[1]} | 電力: ${item.power}</small>
            `;
            div.onclick = () => alert(item.name + 'を選択しました（配置機能は次のステップ）');
            itemList.appendChild(div);
        });
    }

    // --- 3. Konva ステージ・グリッド初期化 ---
    const stage = new Konva.Stage({
        container: 'container',
        width: window.innerWidth,
        height: window.innerHeight,
        draggable: true,
    });

    const layer = new Konva.Layer();
    stage.add(layer);

    function drawGrid() {
        // 背景
        const bg = new Konva.Rect({
            x: 0, y: 0,
            width: MAP_WIDTH, height: MAP_HEIGHT,
            fill: '#1a1c1e',
        });
        layer.add(bg);

        // 線を描画（パフォーマンスのため1本のGroupにまとめることも可能ですが、まずは基本で）
        for (let i = 0; i <= MAP_BLOCKS; i++) {
            // 10マスごとに線を太くして見やすく
            const isMajor = i % 10 === 0;
            layer.add(new Konva.Line({
                points: [i * GRID_SIZE, 0, i * GRID_SIZE, MAP_HEIGHT],
                stroke: isMajor ? '#444' : '#2a2a2a',
                strokeWidth: isMajor ? 2 : 1,
                listening: false
            }));
            layer.add(new Konva.Line({
                points: [0, i * GRID_SIZE, MAP_WIDTH, i * GRID_SIZE],
                stroke: isMajor ? '#444' : '#2a2a2a',
                strokeWidth: isMajor ? 2 : 1,
                listening: false
            }));
        }
    }

    // --- 4. 操作・レスポンシブ処理 ---
    function toggleSidebar() {
        const sb = document.getElementById('sidebar');
        sb.classList.toggle('closed');
        // サイドバー開閉後に描画範囲を更新
        setTimeout(() => {
            const container = document.getElementById('stage-parent');
            stage.width(container.offsetWidth);
            stage.height(container.offsetHeight);
        }, 350);
    }

    // PCズーム
    stage.on('wheel', (e) => {
        e.evt.preventDefault();
        const oldScale = stage.scaleX();
        const pointer = stage.getPointerPosition();
        const mousePointTo = { x: (pointer.x - stage.x()) / oldScale, y: (pointer.y - stage.y()) / oldScale };
        const newScale = e.evt.deltaY > 0 ? oldScale / 1.1 : oldScale * 1.1;
        stage.scale({ x: newScale, y: newScale });
        stage.position({ x: pointer.x - mousePointTo.x * newScale, y: pointer.y - mousePointTo.y * newScale });
    });

    // 初期実行
    window.addEventListener('resize', () => {
        const container = document.getElementById('stage-parent');
        stage.width(container.offsetWidth);
        stage.height(container.offsetHeight);
    });

    drawGrid();
    layer.draw();
    loadExternalData();
</script>
</body>
</html>
